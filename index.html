const REMINDER_THRESHOLD = 5;

var state = {
  tripName: 'Côte Amalfitaine',
  budgetCash: 0,
  budgetCard: 0,
  topUps: [],
  expenses: [],
  days: [{ id: 1, label: 'Jour 1', desc: '' }],
  view: 'dashboard',
  expandedCats: {},
  lastExportInfo: null,
  modal: null,
  editExpenseId: null,
  backupMode: 'menu',
  backupText: '',
  importText: '',
  importResult: null,
  copyDone: false,
  copyError: false
};

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var s = JSON.parse(raw);
      state.tripName = s.tripName || 'Côte Amalfitaine';
      state.budgetCash = s.budgetCash || 0;
      state.budgetCard = s.budgetCard || 0;
      state.topUps = s.topUps || [];
      state.expenses = s.expenses || [];
      state.days = s.days && s.days.length ? s.days : [{ id: 1, label: 'Jour 1', desc: '' }];
    }
    state.lastExportInfo = JSON.parse(localStorage.getItem(LAST_EXPORT_KEY) || 'null');
  } catch(e) {}
}
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tripName: state.tripName, budgetCash: state.budgetCash, budgetCard: state.budgetCard,
      topUps: state.topUps, expenses: state.expenses, days: state.days
    }));
    flashSaved();
  } catch(e) {}
}
function setLastExportVal(info) {
  state.lastExportInfo = info;
  try { localStorage.setItem(LAST_EXPORT_KEY, JSON.stringify(info)); } catch(e) {}
}
function flashSaved() {
  var el = document.getElementById('save-flash');
  if (!el) return;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 1200);
}

function fmt(n) { return new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n) + ' €'; }
function parseAmt(el) { if (!el) return NaN; return parseFloat(String(el.value || '').replace(',', '.').replace(/\s/g, '')); }
function escHTML(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }

function computeTotals() {
  var totalCashAvailable = state.budgetCash + state.topUps.filter(function(t){return t.mode==='cash'}).reduce(function(s,t){return s+t.amount},0);
  var totalCardAvailable = state.budgetCard + state.topUps.filter(function(t){return t.mode==='card'}).reduce(function(s,t){return s+t.amount},0);
  var spentCash = state.expenses.filter(function(e){return e.mode==='cash'}).reduce(function(s,e){return s+e.amount},0);
  var spentCard = state.expenses.filter(function(e){return e.mode==='card'}).reduce(function(s,e){return s+e.amount},0);
  var totalSpent = spentCash + spentCard;
  var totalBudget = totalCashAvailable + totalCardAvailable;
  return { totalCashAvailable:totalCashAvailable, totalCardAvailable:totalCardAvailable, spentCash:spentCash, spentCard:spentCard, totalSpent:totalSpent, totalBudget:totalBudget, soldeCash: totalCashAvailable - spentCash, soldeCard: totalCardAvailable - spentCard };
}

function computeByCategory() {
  var out = {};
  Object.keys(CATEGORIES).forEach(function(cat) {
    out[cat] = { total: 0, cash: 0, card: 0, sub: {} };
    CATEGORIES[cat].sub.forEach(function(s) { out[cat].sub[s] = { total: 0, cash: 0, card: 0, count: 0 }; });
  });
  state.expenses.forEach(function(e) {
    if (out[e.category]) {
      out[e.category].total += e.amount;
      out[e.category][e.mode] += e.amount;
      if (out[e.category].sub[e.subcategory]) {
        out[e.category].sub[e.subcategory].total += e.amount;
        out[e.category].sub[e.subcategory][e.mode] += e.amount;
        out[e.category].sub[e.subcategory].count += 1;
      }
    }
  });
  return out;
}

function computeByDay() {
  var out = {};
  state.days.forEach(function(d) { out[d.id] = { id:d.id, label:d.label, desc:d.desc, total: 0, cash: 0, card: 0, count: 0 }; });
  state.expenses.forEach(function(e) {
    if (out[e.dayId]) {
      out[e.dayId].total += e.amount;
      out[e.dayId][e.mode] += e.amount;
      out[e.dayId].count += 1;
    }
  });
  return out;
}

function getUnsavedCount() {
  if (!state.lastExportInfo) return state.expenses.length;
  var id = state.lastExportInfo.lastExpenseId || 0;
  return state.expenses.filter(function(e) { return e.id > id; }).length;
}

function formatLastExport() {
  if (!state.lastExportInfo) return null;
  var d = new Date(state.lastExportInfo.date);
  var diff = Date.now() - d.getTime();
  var min = Math.floor(diff/60000), h = Math.floor(diff/3600000), dd = Math.floor(diff/86400000);
  if (min < 1) return "À l'instant";
  if (min < 60) return 'Il y a ' + min + ' min';
  if (h < 24) return 'Il y a ' + h + ' h';
  if (dd < 7) return 'Il y a ' + dd + ' j';
  return d.toLocaleDateString('fr-FR');
}

function addExpense(exp) { state.expenses.unshift(Object.assign({}, exp, { id: Date.now() + Math.random() })); saveData(); render(); }
function updateExpenseVal(id, exp) { state.expenses = state.expenses.map(function(e) { return e.id === id ? Object.assign({}, e, exp) : e; }); saveData(); render(); }
function deleteExpense(id) { if (!confirm('Supprimer cette dépense ?')) return; state.expenses = state.expenses.filter(function(e){return e.id!==id}); saveData(); render(); }
function addTopUpVal(mode, amount, note) { state.topUps.unshift({ id: Date.now() + Math.random(), mode: mode, amount: amount, note: note, date: new Date().toISOString() }); saveData(); render(); }
function deleteTopUp(id) { if (!confirm('Supprimer cette recharge ?')) return; state.topUps = state.topUps.filter(function(t){return t.id!==id}); saveData(); render(); }
function addDayVal(label, desc) { var ids = state.days.map(function(d){return d.id}); var nextId = ids.length ? Math.max.apply(null, ids) + 1 : 1; state.days.push({ id: nextId, label: label || ('Jour ' + nextId), desc: desc || '' }); saveData(); render(); }
function updateDayVal(id, label, desc) { state.days = state.days.map(function(d) { return d.id === id ? { id:d.id, label:label, desc:desc } : d; }); saveData(); render(); }
function deleteDay(id) {
  if (state.expenses.some(function(e){return e.dayId===id})) { alert('Ce jour contient des dépenses.'); return; }
  if (!confirm('Supprimer ce jour ?')) return;
  state.days = state.days.filter(function(d){return d.id!==id}); saveData(); render();
}
function resetAll() {
  if (!confirm('Tout effacer ? Pense à sauvegarder avant.')) return;
  state.tripName = 'Mon voyage'; state.budgetCash = 0; state.budgetCard = 0;
  state.topUps = []; state.expenses = []; state.days = [{ id: 1, label: 'Jour 1', desc: '' }];
  state.lastExportInfo = null;
  try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(LAST_EXPORT_KEY); } catch(e) {}
  render();
}

function generateBackupText() {
  var t = computeTotals();
  var data = {
    appVersion: 4,
    exportDate: new Date().toISOString(),
    tripName: state.tripName,
    budgetCash: state.budgetCash,
    budgetCard: state.budgetCard,
    topUps: state.topUps,
    expenses: state.expenses,
    days: state.days,
    stats: { totalSpent: t.totalSpent, totalBudget: t.totalBudget, spentCash: t.spentCash, spentCard: t.spentCard, expenseCount: state.expenses.length }
  };
  return JSON.stringify(data, null, 2);
}

function markAsExported() {
  var lastExpenseId = state.expenses.length ? Math.max.apply(null, state.expenses.map(function(e){return e.id})) : 0;
  setLastExportVal({ date: new Date().toISOString(), expenseCount: state.expenses.length, lastExpenseId: lastExpenseId, tripName: state.tripName });
}

function importFromText(text) {
  try {
    var data = JSON.parse(text);
    if (!data.expenses || !Array.isArray(data.expenses) || !data.days || !Array.isArray(data.days)) {
      return { ok: false, error: "Format invalide — ce n'est pas une sauvegarde valide." };
    }
    state.tripName = data.tripName || 'Mon voyage';
    state.budgetCash = data.budgetCash || 0;
    state.budgetCard = data.budgetCard || 0;
    state.topUps = data.topUps || [];
    state.expenses = data.expenses || [];
    state.days = data.days && data.days.length ? data.days : [{ id: 1, label: 'Jour 1', desc: '' }];
    var lastExpenseId = state.expenses.length ? Math.max.apply(null, state.expenses.map(function(e){return e.id})) : 0;
    setLastExportVal({ date: data.exportDate, expenseCount: state.expenses.length, lastExpenseId: lastExpenseId, tripName: state.tripName });
    saveData();
    return { ok: true, summary: { count: data.expenses.length, name: data.tripName, date: data.exportDate, total: data.stats && data.stats.totalSpent } };
  } catch(e) {
    return { ok: false, error: 'Texte illisible. Vérifie que tu as bien collé le texte complet.' };
  }
}

function icon(name, cls) { return '<svg class="ic ' + (cls || '') + '"><use href="#i-' + name + '"/></svg>'; }

function render() {
  var t = computeTotals();
  var unsaved = getUnsavedCount();
  var needsBackup = unsaved >= REMINDER_THRESHOLD;
  var view = state.view;

  var html = ''
    + '<header class="header">'
      + '<div class="header-top">'
        + '<button class="header-title-btn" onclick="openModal(\'tripName\')">'
          + '<div class="header-kicker">BUDGET VOYAGE</div>'
          + '<div class="header-title">' + escHTML(state.tripName) + ' ' + icon('edit','ic-sm') + '</div>'
        + '</button>'
        + '<div class="header-actions">'
          + '<button class="icon-btn ' + (needsBackup ? 'alert' : '') + '" onclick="openModal(\'backup\')">' + icon('cloud') + '</button>'
          + '<button class="icon-btn" onclick="openModal(\'budget\')">' + icon('settings') + '</button>'
        + '</div>'
      + '</div>'
      + '<div class="soldes">'
        + '<div class="solde ' + (t.soldeCash < 0 ? 'neg' : '') + '">'
          + '<div class="solde-label">' + icon('wallet','ic-sm') + ' SOLDE ESPÈCES</div>'
          + '<div class="solde-value">' + fmt(t.soldeCash) + '</div>'
          + '<div class="solde-sub">sur ' + fmt(t.totalCashAvailable) + '</div>'
        + '</div>'
        + '<div class="solde ' + (t.soldeCard < 0 ? 'neg' : '') + '">'
          + '<div class="solde-label">' + icon('card','ic-sm') + ' SOLDE CARTE</div>'
          + '<div class="solde-value">' + fmt(t.soldeCard) + '</div>'
          + '<div class="solde-sub">sur ' + fmt(t.totalCardAvailable) + '</div>'
        + '</div>'
      + '</div>';
  if (t.totalBudget > 0) {
    html += '<div class="progress-section">'
      + '<div class="progress-text"><span>Dépensé au total</span><span>' + fmt(t.totalSpent) + ' / ' + fmt(t.totalBudget) + '</span></div>'
      + '<div class="progress-bar"><div class="progress-fill ' + (t.totalSpent > t.totalBudget ? 'over' : '') + '" style="width:' + Math.min(100, (t.totalSpent/t.totalBudget)*100) + '%"></div></div>'
      + '</div>';
  }
  html += '<div id="save-flash" class="save-flash">' + icon('check','ic-sm') + ' Sauvegardé</div></header>';

  html += '<nav class="tabs">'
    + '<button class="tab ' + (view==='dashboard'?'active':'') + '" onclick="switchView(\'dashboard\')">' + icon('bar') + '<span>Accueil</span></button>'
    + '<button class="tab ' + (view==='expenses'?'active':'') + '" onclick="switchView(\'expenses\')">' + icon('euro') + '<span>Dépenses</span></button>'
    + '<button class="tab ' + (view==='categories'?'active':'') + '" onclick="switchView(\'categories\')">' + icon('chev') + '<span>Rubriques</span></button>'
    + '<button class="tab ' + (view==='days'?'active':'') + '" onclick="switchView(\'days\')">' + icon('cal') + '<span>Par jour</span></button>'
    + '</nav>';

  html += '<main>';
  if (needsBackup) {
    html += '<div class="alert-box reminder">'
      + '<div style="flex-shrink:0">' + icon('cloud','ic-md') + '</div>'
      + '<div style="flex:1"><div class="alert-title">' + unsaved + ' dépenses non sauvegardées</div><div class="alert-text">Sauvegarde vers Drive pour sécuriser</div></div>'
      + '<button class="alert-btn" onclick="openModal(\'backup\')">Sauvegarder</button>'
      + '</div>';
  }
  if (t.totalBudget === 0) {
    html += '<div class="alert-box warning">'
      + '<div style="flex-shrink:0">' + icon('alert','ic-md') + '</div>'
      + '<div style="flex:1"><div class="alert-title">Définir les budgets</div><div class="alert-text">Saisis le montant emmené en espèces et celui disponible sur carte.</div>'
      + '<button class="alert-btn" style="margin-top:8px" onclick="openModal(\'budget\')">Saisir les budgets</button></div></div>';
  }

  if (view === 'dashboard') html += renderDashboard(t);
  if (view === 'expenses') html += renderExpenses();
  if (view === 'categories') html += renderCategories();
  if (view === 'days') html += renderDays();

  if (view === 'dashboard' && (state.expenses.length > 0 || state.topUps.length > 0)) {
    html += '<div style="text-align:center;margin-top:32px"><button onclick="resetAll()" style="color:#a8a29e;text-decoration:underline;font-size:11px">Tout réinitialiser</button></div>';
  }
  html += '</main>';

  html += '<button class="fab" onclick="openModal(\'expense\')">+</button>';
  if (state.modal) html += renderModal();

  document.getElementById('app').innerHTML = html;
}

function renderDashboard(t) {
  var byCat = computeByCategory();
  var topCats = Object.keys(byCat).map(function(k){return [k, byCat[k]]}).filter(function(p){return p[1].total>0}).sort(function(a,b){return b[1].total-a[1].total}).slice(0,5);
  var lastExp = formatLastExport();
  var h = '';

  h += '<div class="quick">'
    + '<button class="quick-card" onclick="openModal(\'topup\')"><div class="quick-card-label" style="color:#b45309">' + icon('plus','ic-sm') + ' RECHARGER</div><div class="quick-card-desc">Ajouter cash ou virement</div></button>'
    + '<button class="quick-card" onclick="openModal(\'backup\')"><div class="quick-card-label" style="color:#475569">' + icon('cloud','ic-sm') + ' SAUVEGARDE</div><div class="quick-card-desc">' + (lastExp || 'Jamais sauvegardé') + '</div></button>'
    + '</div>';

  h += '<section class="card"><div class="card-title">Dépensé</div><div class="dep-grid">'
    + '<div class="dep-box"><div class="dep-lbl">' + icon('wallet','ic-sm') + ' ESPÈCES</div><div class="dep-val">' + fmt(t.spentCash) + '</div><div class="dep-sub">' + state.expenses.filter(function(e){return e.mode==='cash'}).length + ' dépenses</div></div>'
    + '<div class="dep-box"><div class="dep-lbl">' + icon('card','ic-sm') + ' CARTE</div><div class="dep-val">' + fmt(t.spentCard) + '</div><div class="dep-sub">' + state.expenses.filter(function(e){return e.mode==='card'}).length + ' dépenses</div></div>'
    + '</div></section>';

  h += '<section class="card"><div class="card-title">Top rubriques</div>';
  if (topCats.length === 0) h += '<div style="text-align:center;padding:12px 0;color:#a8a29e;font-size:14px">Aucune dépense</div>';
  else topCats.forEach(function(p) {
    var cat = p[0], data = p[1];
    h += '<div class="row">'
      + '<div class="row-icon" style="background:' + CATEGORIES[cat].color + '15">' + CATEGORIES[cat].icon + '</div>'
      + '<div class="row-main"><div class="row-title">' + escHTML(cat) + '</div><div class="row-sub">' + (t.totalSpent > 0 ? Math.round((data.total/t.totalSpent)*100) : 0) + '%</div></div>'
      + '<div class="row-val">' + fmt(data.total) + '</div></div>';
  });
  h += '</section>';

  if (state.topUps.length > 0) {
    h += '<section class="card"><div class="card-title">Recharges (' + state.topUps.length + ')</div>';
    state.topUps.forEach(function(tu) {
      h += '<div class="topup-row">'
        + '<div style="display:flex;align-items:center;gap:10px">'
        + '<div style="font-size:18px">' + (tu.mode === 'cash' ? '💰' : '💳') + '</div>'
        + '<div><div style="font-size:14px">' + (tu.mode === 'cash' ? 'Espèces' : 'Carte') + '</div>'
        + (tu.note ? '<div style="font-size:11px;color:#78716c;font-style:italic">' + escHTML(tu.note) + '</div>' : '')
        + '</div></div>'
        + '<div style="display:flex;align-items:center;gap:8px">'
        + '<div class="topup-plus">+' + fmt(tu.amount) + '</div>'
        + '<button onclick="deleteTopUp(' + tu.id + ')" style="color:#a8a29e;padding:4px">' + icon('trash','ic-sm') + '</button>'
        + '</div></div>';
    });
    h += '</section>';
  }

  h += '<section class="card"><div class="card-title">Récent</div>';
  if (state.expenses.length === 0) h += '<div style="text-align:center;padding:12px 0;color:#a8a29e;font-size:14px">Aucune dépense</div>';
  else state.expenses.slice(0, 5).forEach(function(e) {
    var day = state.days.filter(function(d){return d.id===e.dayId})[0];
    var cc = CATEGORIES[e.category];
    h += '<div class="row">'
      + '<div class="row-icon" style="background:' + (cc ? cc.color : '#888') + '15">' + (cc ? cc.icon : '•') + '</div>'
      + '<div class="row-main"><div class="row-title">' + escHTML(e.subcategory) + '</div><div class="row-sub">' + (day ? escHTML(day.label) : '') + ' · ' + escHTML(e.note || e.category) + '</div></div>'
      + '<div><div class="row-val">' + fmt(e.amount) + '</div><div class="row-mode">' + (e.mode === 'cash' ? icon('wallet','ic-sm') + ' Espèces' : icon('card','ic-sm') + ' Carte') + '</div></div>'
      + '</div>';
  });
  h += '</section>';
  return h;
}

function renderExpenses() {
  var t = computeTotals();
  if (state.expenses.length === 0) {
    return '<div style="font-size:11px;color:#78716c;margin-bottom:8px">0 dépense · ' + fmt(0) + '</div>'
      + '<div class="empty"><div>Aucune dépense pour le moment</div><button class="empty-btn" onclick="openModal(\'expense\')">+ Ajouter la première</button></div>';
  }
  var h = '<div style="font-size:11px;color:#78716c;margin-bottom:8px">' + state.expenses.length + ' dépense' + (state.expenses.length > 1 ? 's' : '') + ' · ' + fmt(t.totalSpent) + '</div>';
  state.expenses.forEach(function(e) {
    var day = state.days.filter(function(d){return d.id===e.dayId})[0];
    var cc = CATEGORIES[e.category];
    h += '<div class="exp-item">'
      + '<div class="row-icon" style="background:' + (cc ? cc.color : '#888') + '15">' + (cc ? cc.icon : '•') + '</div>'
      + '<div class="row-main"><div class="row-title">' + escHTML(e.subcategory) + '</div>'
      + '<div class="row-sub">' + (day ? escHTML(day.label) : '') + ' · ' + (e.mode === 'cash' ? icon('wallet','ic-sm') + ' Espèces' : icon('card','ic-sm') + ' Carte') + '</div>'
      + (e.note ? '<div class="row-note">' + escHTML(e.note) + '</div>' : '')
      + '</div>'
      + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
      + '<div class="row-val">' + fmt(e.amount) + '</div>'
      + '<div class="exp-actions">'
      + '<button onclick="editExpenseStart(' + e.id + ')" aria-label="Modifier">' + icon('edit') + '</button>'
      + '<button class="btn-del" onclick="deleteExpense(' + e.id + ')" aria-label="Supprimer">' + icon('trash') + '</button>'
      + '</div></div></div>';
  });
  return h;
}

function renderCategories() {
  var byCat = computeByCategory();
  var h = '';
  Object.keys(byCat).forEach(function(cat) {
    var data = byCat[cat];
    var open = !!state.expandedCats[cat];
    h += '<div class="cat-wrap ' + (open ? 'open' : '') + '">'
      + '<button class="cat-head" onclick="toggleCat(\'' + cat.replace(/'/g, "\\'") + '\')">'
      + '<div class="row-icon" style="background:' + CATEGORIES[cat].color + '15">' + CATEGORIES[cat].icon + '</div>'
      + '<div class="row-main"><div class="row-title">' + escHTML(cat) + '</div>'
      + '<div class="row-sub">' + icon('wallet','ic-sm') + ' ' + fmt(data.cash) + ' · ' + icon('card','ic-sm') + ' ' + fmt(data.card) + '</div></div>'
      + '<div class="row-val">' + fmt(data.total) + '</div>'
      + '<div class="cat-chev">' + icon('chev') + '</div>'
      + '</button>'
      + '<div class="cat-body">';
    var hasSubs = false;
    CATEGORIES[cat].sub.forEach(function(s) {
      if (data.sub[s].total > 0) {
        hasSubs = true;
        h += '<div class="sub-row"><div>'
          + '<div>' + escHTML(s) + '</div>'
          + '<div class="sub-row-sub">' + data.sub[s].count + ' × · Esp. ' + fmt(data.sub[s].cash) + ' · Carte ' + fmt(data.sub[s].card) + '</div>'
          + '</div><div class="sub-row-val">' + fmt(data.sub[s].total) + '</div></div>';
      }
    });
    if (!hasSubs) h += '<div style="padding:12px 16px;color:#a8a29e;font-size:12px;font-style:italic">Aucune dépense</div>';
    h += '</div></div>';
  });
  return h;
}

function renderDays() {
  var byDay = computeByDay();
  var h = '<button class="btn-full" style="background:#fff;border:1px solid #e7e5e4;color:#0f172a;margin-bottom:12px" onclick="openModal(\'dayMgr\')">' + icon('cal','ic-md') + ' Gérer les jours (' + state.days.length + ')</button>';
  state.days.forEach(function(d) {
    var dayData = byDay[d.id];
    var dayExp = state.expenses.filter(function(e){return e.dayId===d.id});
    h += '<div class="day-wrap">'
      + '<div class="day-head"><div style="flex:1;min-width:0">'
      + '<div style="font-size:14px;font-weight:600">' + escHTML(d.label) + '</div>'
      + (d.desc ? '<div style="font-size:11px;color:#78716c;font-style:italic">' + escHTML(d.desc) + '</div>' : '')
      + '<div style="font-size:11px;color:#78716c;margin-top:2px">' + dayExp.length + ' dépense' + (dayExp.length > 1 ? 's' : '') + ' · Esp. ' + fmt(dayData.cash) + ' · Carte ' + fmt(dayData.card) + '</div>'
      + '</div><div class="row-val">' + fmt(dayData.total) + '</div></div>';
    if (dayExp.length > 0) {
      h += '<div class="day-body">';
      dayExp.forEach(function(e) {
        var cc = CATEGORIES[e.category];
        h += '<div class="day-exp-row"><div>' + (cc ? cc.icon : '•') + '</div>'
          + '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">' + escHTML(e.subcategory) + '</div>'

function doCopy() {

navigator.clipboard.writeText(state.backupText).then(function() {
state.copyDone = true; state.copyError = false; markAsExported(); render();
setTimeout(function() { state.copyDone = false; render(); }, 3000);
}).catch(function() {
state.copyError = true;

render();
});
} else {

render();
}
}

navigator.clipboard.readText().then(function(t) { state.importText = t; render(); }).catch(function() {

}
